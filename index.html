<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Unemployment central</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
	<link
		href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--bg-color: #0d0f10;
			--card-bg: #161819;
			--text-main: #ffffff;
			--text-muted: #9ba1a6;
			--accent-glow: #a8ffdc;
			--border-color: rgba(255, 255, 255, 0.05);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: "Inter", sans-serif;
		}

		body {
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background-color: var(--bg-color);
			color: var(--text-main);
			background-image:
				radial-gradient(circle at 20% 30%, rgba(40, 50, 50, 0.15) 0%, transparent 40%),
				radial-gradient(circle at 80% 70%, rgba(30, 40, 40, 0.15) 0%, transparent 40%);
			overflow-x: hidden;
			transition: background-color 0.3s ease, color 0.3s ease;
		}

		/* Scaled down container */
		.container {
			width: 100%;
			max-width: 460px;
			/* Made it significantly smaller */
			text-align: center;
			padding: 20px;
		}

		/* --- TABS (From Proxyfox) --- */
		.tabs {
			display: flex;
			gap: 6px;
			margin-bottom: 20px;
			justify-content: center;
		}

		.tab {
			background: transparent;
			border: none;
			color: var(--text-muted);
			font-size: 0.75rem;
			font-weight: 500;
			padding: 4px 12px;
			border-radius: 6px;
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.tab:hover,
		.tab.active {
			color: var(--text-main);
			background: var(--card-bg);
			border: 1px solid var(--border-color);
		}

		/* --- LOGO & QUOTES --- */
		.logo {
			font-family: 'Dancing Script', cursive;
			font-size: 2.8rem;
			/* Scaled down */
			margin-bottom: 0.2rem;
			color: #eee;
		}

		.quote {
			color: var(--text-muted);
			font-size: 0.85rem;
			font-style: italic;
			margin-bottom: 1.5rem;
		}

		/* --- SEARCH --- */
		.search-container {
			position: relative;
			margin-bottom: 0.5rem;
		}

		input {
			width: 100%;
			padding: 12px 16px;
			/* Scaled down */
			font-size: 0.95rem;
			background: #1c1e1f;
			color: white;
			border: 1px solid #333;
			border-radius: 8px;
			outline: none;
			transition: all 0.3s ease;
		}

		.search-underline {
			position: absolute;
			bottom: 0;
			left: 50%;
			transform: translateX(-50%);
			width: 80%;
			height: 2px;
			background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
			box-shadow: 0 0 10px var(--accent-glow);
			opacity: 0.5;
			transition: opacity 0.3s;
		}

		input:focus+.search-underline {
			opacity: 1;
		}

		/* --- ENGINE SELECT (From Proxyfox) --- */
		.engine {
			display: flex;
			justify-content: center;
			margin-bottom: 1.5rem;
		}

		.engine-wrapper {
			position: relative;
		}

		select {
			appearance: none;
			background: transparent;
			color: var(--text-muted);
			border: 1px solid transparent;
			padding: 0.3rem 1.4rem 0.3rem 0.6rem;
			border-radius: 4px;
			font-size: 0.75rem;
			cursor: pointer;
			outline: none;
		}

		select:hover,
		select:focus {
			color: var(--text-main);
			background: var(--card-bg);
		}

		.engine-wrapper i {
			position: absolute;
			right: 6px;
			top: 50%;
			transform: translateY(-50%);
			font-size: 0.6rem;
			color: var(--text-muted);
			pointer-events: none;
		}

		button[type="submit"] {
			display: none;
		}

		/* --- APP GRID --- */
		.grid-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 0.8rem;
			padding: 0 5px;
		}

		.grid-header span {
			font-size: 0.9rem;
			color: #ccc;
		}

		.edit-btn {
			background: #1c1e1f;
			border: 1px solid #333;
			color: var(--text-muted);
			padding: 4px 12px;
			border-radius: 6px;
			cursor: pointer;
			font-size: 0.8rem;
		}

		.app-grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 10px;
			/* Scaled down */
		}

		.app-card {
			background: var(--card-bg);
			border-radius: 10px;
			padding: 14px 8px;
			/* Scaled down */
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-decoration: none;
			transition: transform 0.2s, background 0.2s;
			border: 1px solid transparent;
		}

		.app-card:hover {
			background: #1e2021;
			transform: translateY(-2px);
			border-color: #333;
		}

		.app-card i {
			font-size: 1.4rem;
			/* Scaled down */
			margin-bottom: 8px;
		}

		.app-card span {
			font-size: 0.75rem;
			/* Scaled down */
			color: var(--text-muted);
		}

		/* Specific Icon Colors */
		.fa-youtube {
			color: #ff0000;
		}

		.fa-github {
			color: #ffffff;
		}

		.fa-discord {
			color: #5865F2;
		}

		.fa-reddit {
			color: #ff4500;
		}

		.fa-google {
			color: #4285F4;
		}

		.fa-x-twitter {
			color: #ffffff;
		}

		.fa-tiktok {
			color: #ffffff;
		}

		.fa-cube {
			color: #ffffff;
		}

		.nvidia {
			color: #76b900;
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="tabs" id="tabContainer">
			<button class="tab active">Proxy</button>
			<button class="tab">Web</button>
			<button class="tab">Media</button>
			<button class="tab">Settings</button>
		</div>

		<div class="logo">Unemployment central</div>
		<div class="quote" id="quoteText">"loading next distraction..."</div>

		<form id="searchForm">
			<div class="search-container">
				<input type="text" placeholder="search or enter url..." id="searchInput" autocomplete="off" required>
				<div class="search-underline"></div>
			</div>

			<div class="engine">
				<div class="engine-wrapper">
					<select id="engineSelect">
                        <option value="https://duckduckgo.com/?q=" selected>DuckDuckGo (Strict)</option>
                        <option value="https://www.google.com/search?q=">Google</option>
                        <option value="https://search.brave.com/search?q=">Brave Search</option>
                        <option value="https://www.startpage.com/do/search?q=">Startpage</option>
                    </select>
					<i class="fa-solid fa-chevron-down"></i>
				</div>
			</div>
			<button type="submit">Go</button>
		</form>

		<div class="grid-header">
			<span>Quick apps</span>
			<button class="edit-btn">Edit</button>
		</div>

		<div class="app-grid">
			<a href="https://youtube.com" class="app-card">
				<i class="fab fa-youtube"></i><span>YouTube</span>
			</a>
			<a href="https://github.com" class="app-card">
				<i class="fab fa-github"></i><span>GitHub</span>
			</a>
			<a href="https://discord.com" class="app-card">
				<i class="fab fa-discord"></i><span>Discord</span>
			</a>
			<a href="https://reddit.com" class="app-card">
				<i class="fab fa-reddit"></i><span>Reddit</span>
			</a>
			<a href="https://google.com" class="app-card">
				<i class="fab fa-google"></i><span>Google</span>
			</a>
			<a href="https://twitter.com" class="app-card">
				<i class="fab fa-x-twitter"></i><span>Twitter/X</span>
			</a>
			<a href="https://beech.watch" class="app-card">
				<i class="fa-solid fa-film"></i><span>Movies</span>
			</a>
			<a href="https://astra.pxi-fusion.com" class="app-card">
				<i class="fa-solid fa-gamepad"></i><span>Games</span>
			</a>
			<a href="https://tiktok.com" class="app-card">
				<i class="fab fa-tiktok"></i><span>TikTok</span>
			</a>
			<a href="https://roblox.com" class="app-card">
				<i class="fa-solid fa-cube"></i><span>Roblox</span>
			</a>
			<a href="https://play.geforcenow.com" class="app-card">
				<i class="fa-solid fa-eye nvidia"></i><span>GeForce</span>
			</a>
			<a href="https://duck.ai" class="app-card">
				<i class="fa-solid fa-wand-magic-sparkles"></i><span>AI</span>
			</a>
		</div>
	</div>

	<script>
		// --- RANDOM QUOTES ---
        const quotes = [
            '"master of unemployment"',
            '"professional time waster"',
            '"dodging responsibilities since 2024"',
            '"CEO of free time"',
            '"currently avoiding reality"',
            '"degree in procrastination"'
        ];
        document.getElementById('quoteText').innerText = quotes[Math.floor(Math.random() * quotes.length)];

        // --- PROXYFOX LOGIC ---
        const tabs = document.querySelectorAll('.tab');
        const input = document.getElementById("searchInput");
        
        // Tab switching focuses input
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                input.focus();
            });
        });

        // Search Form Logic
        const form = document.getElementById("searchForm");
        const engine = document.getElementById("engineSelect");

        input.focus();

        function isURL(text) {
            return /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(text) ||
                text.startsWith("http://") ||
                text.startsWith("https://") ||
                text.startsWith("about:");
        }

        form.addEventListener("submit", e => {
            e.preventDefault();
            let value = input.value.trim();
            if (!value) return;

            // Direct URL vs Search Query routing
            if (isURL(value)) {
                if (!value.startsWith("http")) value = "https://" + value;
                window.location.href = value;
            } else {
                window.location.href = engine.value + encodeURIComponent(value);
            }
        });

        // --- THEME SYNC (From proxyfox) ---
        function syncEdulearnTheme() {
            try {
                const savedSettings = JSON.parse(localStorage.getItem('el_settings')) || {};
                const theme = savedSettings.theme || 'default';
                const bgUrl = savedSettings.bgUrl || '';

                if (bgUrl) {
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    document.body.style.backgroundImage = `radial-gradient(circle at 20% 30%, rgba(40, 50, 50, 0.15) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(30, 40, 40, 0.15) 0%, transparent 40%)`;
                }
            } catch (err) {
                console.error("Theme sync failed:", err);
            }
        }

        syncEdulearnTheme();
        window.addEventListener('storage', (e) => {
            if (e.key === 'el_settings') syncEdulearnTheme();
        });
	</script>
</body>

</html>
